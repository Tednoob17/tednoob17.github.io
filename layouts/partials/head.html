<!-- risotto theme -->
<link rel="stylesheet" href="{{ printf "css/palettes/%s.css" (.Site.Params.theme.palette | default "base16-dark") | absURL }}" id="theme-css">
<link rel="stylesheet" href="{{ "css/risotto.css" | absURL }}">
<link rel="stylesheet" href="{{ "css/custom.css" | absURL }}">

<script>
document.addEventListener('DOMContentLoaded', function() {
  // Theme Toggle - with whitelist validation for security
  const themeToggle = document.getElementById('theme-toggle');
  const themeCss = document.getElementById('theme-css');
  const darkTheme = "tokyo-night-dark";
  const lightTheme = "tokyo-night-light";
  
  // Whitelist of allowed themes - validation against XSS
  const ALLOWED_THEMES = [
    "base16-dark",
    "base16-light",
    "tokyo-night-dark",
    "tokyo-night-light",
    "material",
    "apprentice",
    "atelier-cave-dark",
    "atelier-cave-light",
    "atelier-dune-dark",
    "atelier-dune-light",
    "atelier-estuary-dark",
    "atelier-estuary-light",
    "atelier-forest-dark",
    "atelier-forest-light",
    "atelier-heath-dark",
    "atelier-heath-light",
    "atelier-lakeside-dark",
    "atelier-lakeside-light",
    "atelier-plateau-dark",
    "atelier-plateau-light",
    "atelier-savanna-dark",
    "atelier-savanna-light",
    "atelier-seaside-dark",
    "atelier-seaside-light",
    "atom-one-dark",
    "atom-one-light",
    "gruvbox-dark",
    "gruvbox-light"
  ];
  
  // Validate theme against whitelist - prevents XSS through localStorage
  const isValidTheme = (theme) => {
    return ALLOWED_THEMES.includes(theme);
  };

  // Check storage with validation
  const savedTheme = localStorage.getItem('theme');
  if (savedTheme && isValidTheme(savedTheme)) {
    const baseUrl = themeCss.href.substring(0, themeCss.href.lastIndexOf('/'));
    themeCss.href = baseUrl + '/' + savedTheme + '.css';
  }

  if (themeToggle) {
    themeToggle.addEventListener('click', function(e) {
      e.preventDefault();
      const currentHref = themeCss.href;
      const isDark = currentHref.includes(darkTheme) || currentHref.includes('dark');
      const newTheme = isDark ? lightTheme : darkTheme;

      const baseUrl = themeCss.href.substring(0, themeCss.href.lastIndexOf('/'));
      themeCss.href = baseUrl + '/' + newTheme + '.css';
      localStorage.setItem('theme', newTheme);
    });
  }

  // Search - Safe DOM manipulation to prevent XSS
  const searchTrigger = document.getElementById('search-trigger');
  const searchOverlay = document.getElementById('search-overlay');
  const searchClose = document.getElementById('search-close');
  const searchInput = document.getElementById('search-input');
  const searchResults = document.getElementById('search-results');

  let searchIndex = null;
  let isLoading = false;

  // Create safe search result element without innerHTML
  const createSafeSearchResult = (result, query) => {
    const li = document.createElement('li');
    li.style.marginBottom = '15px';
    
    // Create title link - using textContent for safety
    const titleLink = document.createElement('a');
    titleLink.href = result.permalink;
    titleLink.style.color = '#61bfff';
    titleLink.style.fontSize = '1.2em';
    titleLink.style.textDecoration = 'none';
    titleLink.style.fontWeight = 'bold';
    titleLink.style.display = 'block';
    titleLink.textContent = result.title;
    
    // Create snippet div
    const snippetDiv = document.createElement('div');
    snippetDiv.style.color = '#ccc';
    snippetDiv.style.fontSize = '0.9em';
    snippetDiv.style.marginTop = '5px';
    
    // Create safe snippet with proper escaping
    if (result.content && query.length >= 2) {
      const lowerContent = result.content.toLowerCase();
      const queryLower = query.toLowerCase();
      const idx = lowerContent.indexOf(queryLower);
      
      if (idx !== -1) {
        const start = Math.max(0, idx - 40);
        const end = Math.min(result.content.length, idx + query.length + 40);
        
        snippetDiv.appendChild(document.createTextNode('...'));
        
        if (start > 0) {
          snippetDiv.appendChild(document.createTextNode(result.content.substring(start, idx)));
        }
        
        const mark = document.createElement('mark');
        mark.style.backgroundColor = '#0f0';
        mark.style.color = '#000';
        mark.textContent = result.content.substring(idx, idx + query.length);
        snippetDiv.appendChild(mark);
        
        snippetDiv.appendChild(document.createTextNode(result.content.substring(idx + query.length, end)));
        snippetDiv.appendChild(document.createTextNode('...'));
      } else {
        snippetDiv.textContent = result.content.substring(0, 100);
      }
    }
    
    li.appendChild(titleLink);
    li.appendChild(snippetDiv);
    
    return li;
  };

  const performSearch = (query) => {
    if (!searchIndex || query.length < 2) {
        searchResults.innerHTML = '';
        return;
    }

    const results = searchIndex.filter(item => {
        const title = item.title ? item.title.toLowerCase() : '';
        const content = item.content ? item.content.toLowerCase() : '';
        return title.includes(query) || content.includes(query);
    });

    // Clear results safely without innerHTML
    searchResults.innerHTML = '';
    
    if (results.length > 0) {
        const ul = document.createElement('ul');
        ul.style.listStyle = 'none';
        ul.style.padding = '0';
        
        results.slice(0, 10).forEach(result => {
            const li = createSafeSearchResult(result, query);
            ul.appendChild(li);
        });
        
        searchResults.appendChild(ul);
    } else {
        const noResults = document.createElement('p');
        noResults.textContent = 'No results found.';
        searchResults.appendChild(noResults);
    }
  };

  if (searchTrigger) {
    searchTrigger.addEventListener('click', function(e) {
        e.preventDefault();
        searchOverlay.style.display = 'block';
        searchInput.focus();

        if (!searchIndex && !isLoading) {
            isLoading = true;
            searchResults.innerHTML = '';
            const loadingMsg = document.createElement('p');
            loadingMsg.style.color = '#888';
            loadingMsg.textContent = 'Loading search index...';
            searchResults.appendChild(loadingMsg);
            
            // Use relURL to ensure it works on localhost and subpaths
            fetch('{{ "index.json" | relURL }}')
                .then(response => {
                    if (!response.ok) {
                         throw new Error('Network response was not ok: ' + response.statusText);
                    }
                    return response.json();
                })
                .then(data => {
                    searchIndex = data;
                    isLoading = false;
                    searchResults.innerHTML = '';
                    if (searchInput.value.length >= 2) {
                        performSearch(searchInput.value.toLowerCase());
                    }
                })
                .catch(error => {
                    console.error('Error fetching search index:', error);
                    isLoading = false;
                    searchResults.innerHTML = '';
                    const errorMsg = document.createElement('p');
                    errorMsg.style.color = 'red';
                    errorMsg.textContent = 'Error loading search index. Check console.';
                    searchResults.appendChild(errorMsg);
                });
        }
    });
  }

  if (searchClose) {
    searchClose.addEventListener('click', function() {
        searchOverlay.style.display = 'none';
    });
  }
  
  // Close on Escape key
  document.addEventListener('keydown', function(e) {
      if (e.key === "Escape" && searchOverlay.style.display === 'block') {
          searchOverlay.style.display = 'none';
      }
  });

  if (searchInput) {
    searchInput.addEventListener('input', function() {
        const query = this.value.toLowerCase();
        performSearch(query);
    });
  }
});
</script>

<!-- Lightbox / click-to-zoom -->
<script>
document.addEventListener('DOMContentLoaded', function () {
  // Create overlay once
  const overlay = document.createElement('div');
  overlay.className = 'lightbox-overlay';
  const lbImg = document.createElement('img');
  overlay.appendChild(lbImg);
  document.body.appendChild(overlay);

  // Close on click or Escape
  overlay.addEventListener('click', function () {
    overlay.classList.remove('active');
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') overlay.classList.remove('active');
  });

  // Attach to every content image
  document.querySelectorAll('.content__body img, article img').forEach(function (img) {
    img.style.cursor = 'zoom-in';
    img.addEventListener('click', function (e) {
      e.stopPropagation();
      lbImg.src = this.src;
      lbImg.alt = this.alt || '';
      overlay.classList.add('active');
    });
  });
});
</script>
