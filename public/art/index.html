    justify-content: center;
}

#close-inline-search:hover {
    color: #268BD2;
}

.no-results-msg {
    text-align: center;
    padding: 40px;
    color: #AAA;
}

@media (max-width: 768px) {
    #floating-search-btn {
        bottom: 20px;
        right: 20px;
        width: 50px;
        height: 50px;
    }
    
    #inline-search-overlay {
        padding-top: 50px;
    }
}
</style>

<script>
let searchIndex = [];


fetch('/index.json')
    .then(response => response.json())
    .then(data => {
        searchIndex = data;
    })
    .catch(error => console.error('Error loading search index:', error));


function performSearch(query) {
    if (!query || query.trim().length < 2) {
        return [];
    }
    
    query = query.toLowerCase().trim();
    const results = [];
    
    searchIndex.forEach(item => {
        let score = 0;
        const title = item.title.toLowerCase();
        const contents = item.contents.toLowerCase();
        
        if (title.includes(query)) {
            score += 10;
        }
        
        if (contents.includes(query)) {
            score += 5;
        }
        
        if (item.tags) {
            item.tags.forEach(tag => {
                if (tag.toLowerCase().includes(query)) {
                    score += 3;
                }
            });
        }
        
        if (score > 0) {
            results.push({
                ...item,
                score: score
            });
        }
    });
    
    results.sort((a, b) => b.score - a.score);
    return results.slice(0, 10); 
}


function displayInlineResults(results, query) {
    const resultsContainer = document.getElementById('inline-search-results');
    
    if (results.length === 0) {
        resultsContainer.innerHTML = '<div class="no-results-msg">No results found for "' + query + '"</div>';
        return;
    }
    
    let html = '';
    results.forEach(result => {
        let excerpt = result.contents.substring(0, 150);
        const queryIndex = result.contents.toLowerCase().indexOf(query.toLowerCase());
        if (queryIndex > 0) {
            const start = Math.max(0, queryIndex - 75);
            const end = Math.min(result.contents.length, queryIndex + 75);
            excerpt = '...' + result.contents.substring(start, end) + '...';
        }
        
        html += '<div class="inline-result" onclick="window.location.href=\'' + result.permalink + '\'">';
        html += '<div class="inline-result-title">' + result.title + '</div>';
        html += '<div class="inline-result-excerpt">' + excerpt + '</div>';
        html += '</div>';
    });
    
    resultsContainer.innerHTML = html;
}


window.showInlineSearch = function() {
    document.getElementById('inline-search-overlay').style.display = 'flex';
    setTimeout(() => {
        document.getElementById('inline-search-input').focus();
    }, 100);
}

function closeInlineSearch() {
    document.getElementById('inline-search-overlay').style.display = 'none';
    document.getElementById('inline-search-results').innerHTML = '';
    document.getElementById('inline-search-input').value = '';
}


document.addEventListener('DOMContentLoaded', () => {
    
    const floatingBtn = document.getElementById('floating-search-btn');
    if (floatingBtn) {
        floatingBtn.addEventListener('click', window.showInlineSearch);
    }
    
    
    const closeBtn = document.getElementById('close-inline-search');
    if (closeBtn) {
        closeBtn.addEventListener('click', closeInlineSearch);
    }
    
    
    const searchInput = document.getElementById('inline-search-input');
    if (searchInput) {
        searchInput.addEventListener('input', () => {
            const query = searchInput.value;
            if (query.length >= 2) {
                const results = performSearch(query);
                displayInlineResults(results, query);
            } else {
                document.getElementById('inline-search-results').innerHTML = '';
            }
        });
    }
    
    
    const overlay = document.getElementById('inline-search-overlay');
    if (overlay) {
        overlay.addEventListener('click', function(e) {
            if (e.target === this) {
                closeInlineSearch();
            }
        });
    }
    
    
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            closeInlineSearch();
        }
    });
    
    
    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
            e.preventDefault();
            window.showInlineSearch();
        }
    });
});


document.addEventListener('DOMContentLoaded', () => {
    
    document.getElementById('close-inline-search').addEventListener('click', closeInlineSearch);
    
    
    const searchInput = document.getElementById('inline-search-input');
    searchInput.addEventListener('input', () => {
        const query = searchInput.value;
        if (query.length >= 2) {
            const results = performSearch(query);
            displayInlineResults(results, query);
        } else {
            document.getElementById('inline-search-results').innerHTML = '';
        }
    });
    
    
    document.getElementById('inline-search-overlay').addEventListener('click', function(e) {
        if (e.target === this) {
            closeInlineSearch();
        }
    });
    
    
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            closeInlineSearch();
        }
    });
    
    
    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
            e.preventDefault();
            showInlineSearch();
        }
    });
});
</script>

    </body>
</html>
