baseURL = 'https://tednoob17.github.io/'
languageCode = 'en-us'
title = 'Tedsig42'
theme = 'risotto'

# Multi-language support
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false

[languages]
  [languages.en]
    languageName = "English"
    languageCode = "en-us"
    weight = 1
    baseURL = "https://tednoob17.github.io/"
    contentDir = "content/en"
    
    [languages.en.menu.main]
      [[languages.en.menu.main]]
        name = "About"
        url = "/about/"
        weight = 1
      [[languages.en.menu.main]]
        name = "Posts"
        url = "/posts/"
        weight = 2
      [[languages.en.menu.main]]
        name = "Friends"
        url = "/friends/"
        weight = 3
      [[languages.en.menu.main]]
        name = "Art"
        url = "/art/"
        weight = 5
      [[languages.en.menu.main]]
        name = "Book Review"
        url = "/book-reviews/"
        weight = 6
      [[languages.en.menu.main]]
        name = "Blogs"
        url = "/blogs/"
        weight = 6
      [[languages.en.menu.main]]
        name = "Contact"
        url = "/contact/"
        weight = 6    
      [[languages.en.menu.main]]
        name = "Achievements"
        url = "/achievements/"
        weight = 10

  [languages.fr]
    languageName = "Français"
    languageCode = "fr"
    weight = 2
    baseURL = "https://tednoob17.github.io/fr/"
    contentDir = "content/fr"
    
    [languages.fr.menu.main]
      [[languages.fr.menu.main]]
        name = "À propos"
        url = "/fr/about/"
        weight = 1
      [[languages.fr.menu.main]]
        name = "Articles"
        url = "/fr/posts/"
        weight = 2
      [[languages.fr.menu.main]]
        name = "Amis"
        url = "/fr/friends/"
        weight = 3
      [[languages.fr.menu.main]]
        name = "Art"
        url = "/fr/art/"
        weight = 5
      [[languages.fr.menu.main]]
        name = "Critiques"
        url = "/fr/book-reviews/"
        weight = 6
      [[languages.fr.menu.main]]
        name = "Blogs"
        url = "/fr/blogs/"
        weight = 6
      [[languages.fr.menu.main]]
        name = "Contact"
        url = "/fr/contact/"
        weight = 6    
      [[languages.fr.menu.main]]
        name = "Réalisations"
        url = "/fr/achievements/"
        weight = 10

