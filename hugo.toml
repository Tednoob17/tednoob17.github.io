[params]
  noindex = false
  favicon = "/images/gif/jinji.gif"
  [params.about]
    title = "Tedsig42"
    description = "Another infosec enthusiast blog"
    logo_image = "/images/gif/ed.gif"

  [params.theme]
    palette = "material"

  [[params.socialLinks]]
    title = "GitHub"
    url = "https://github.com/Tednoob17"
    icon = "fab fa-github"

  [[params.socialLinks]]
    title = "Twitter"
    url = "https://twitter.com/Tedsig42"
    icon = "fab fa-twitter"

  [[params.socialLinks]]
    title = "Instagram"
    url = "https://instagram.com/tedsig_art"
    icon = "fab fa-instagram"
    
  [[params.socialLinks]]
    title = "LinkedIn"
    url = "https://linkedin.com/in/ted-kouhouenou"
    icon = "fab fa-linkedin"

[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3
    ordered = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    style = "monokai"
    tabWidth = 4

summaryLength = 30



